name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of this workflow when a new commit is pushed to the
# same branch — saves CI minutes on rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm -r build` runs `tsc` for the server and `tsc -b && vite build`
      # for the web package — that's the typecheck step for both.
      - name: Build (server typecheck + web bundle)
        run: pnpm -r build

      - name: Run server tests
        run: pnpm --filter @opendialer/server test

      - name: Run web tests
        run: pnpm --filter @opendialer/web test

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t opendialer:test .
