name: E2E Tests

# Runs the Playwright E2E suite. Triggered on pull requests only — not on
# push to main — to keep mainline CI fast. The E2E suite builds the server
# + frontend, spins up the production binary on port 3000, and drives it
# with a real browser, which adds ~3-5 minutes per run.

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E suite
        run: pnpm test:e2e
        env:
          DEFAULT_ADMIN_PASSWORD: testpass123
          DEFAULT_ADMIN_EMAIL: admin@localhost
          REQUIRE_MFA: 'false'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
