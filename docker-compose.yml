services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/packages/server/data
      - uploads:/app/packages/server/uploads
    env_file: .env
    restart: unless-stopped

  # Cloudflare Tunnel — exposes the app publicly with HTTPS
  # Option A: Quick anonymous tunnel (URL changes each restart, no account needed)
  #   Run: docker compose --profile tunnel up
  #   Check logs for URL: docker compose logs tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://app:3000
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - tunnel

  # Option B: Persistent named tunnel (stable custom domain)
  #   1. Create free Cloudflare account + add a domain
  #   2. Zero Trust dashboard → Tunnels → Create tunnel
  #   3. Set hostname: app.yourdomain.com → http://app:3000
  #   4. Copy token to .env as CLOUDFLARE_TUNNEL_TOKEN=eyJ...
  #   5. Run: docker compose --profile tunnel-named up
  tunnel-named:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
    profiles:
      - tunnel-named

volumes:
  db-data:      # Persistent SQLite database
  uploads:      # Persistent uploaded recordings
