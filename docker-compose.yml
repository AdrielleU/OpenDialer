services:
  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    expose:
      - "3000"
    ports:
      - "3000:3000"       # Local access — remove if only using tunnel
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    env_file: .env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

  # Cloudflare Tunnel — exposes the app publicly with HTTPS
  # Option A: Quick anonymous tunnel (URL changes each restart, no account needed)
  #   Uncomment below, run `docker compose up`, check logs for URL:
  #   docker compose logs tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://web:80
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - tunnel

  # Option B: Persistent named tunnel (stable custom domain)
  #   1. Create free Cloudflare account + add a domain
  #   2. Zero Trust dashboard → Tunnels → Create tunnel
  #   3. Set hostname: app.yourdomain.com → http://web:80
  #   4. Copy token to .env as CLOUDFLARE_TUNNEL_TOKEN=eyJ...
  #   5. Run: docker compose --profile tunnel-named up
  tunnel-named:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - tunnel-named

volumes:
  db-data:      # Persistent SQLite database (works on Windows + Linux)
  uploads:      # Persistent uploaded recordings
